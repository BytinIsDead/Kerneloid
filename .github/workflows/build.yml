name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm qemu-system-x86 grub-pc-bin xorriso mtools make gcc

    - name: Build kernel
      run: make build

    - name: Build ISO
      run: make iso

    - name: Test boot (QEMU)
      run: |
        timeout 10s qemu-system-x86_64 -cdrom build/tinx.iso -no-reboot -display none || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tinx-kernel
        path: |
          build/tinx.bin
          build/tinx.iso
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/tinx.iso
          build/tinx.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        retention-days: 1000
