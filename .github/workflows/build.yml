name: Build Tinx Kernel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm qemu-system-x86 grub-pc-bin xorriso mtools
        
    - name: Build kernel
      run: make build
      
    - name: Build ISO
      run: make iso
      
    - name: Test boot (QEMU)
      run: |
        timeout 10s qemu-system-x86_64 -cdrom build/tinx.iso -no-reboot -display none || true
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tinx-kernel
        path: |
          build/tinx.bin
          build/tinx.iso
        retention-days: 1000
